<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎁 Секретный квест!</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Segoe UI', cursive, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; height: 100vh; }
        
        .hidden { display: none !important; }
        
        /* Экран входа */
        #auth-screen {
            position: fixed; top:0; left:0; width:100vw; height:100vh;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; padding: 20px; text-align: center;
        }
        .login-box { background: rgba(255,255,255,0.2); padding: 30px; border-radius: 30px; backdrop-filter: blur(10px); max-width: 340px; width: 100%; }
        .login-box h2 { font-size: 24px; margin-bottom: 10px; }
        .login-box p { font-size: 14px; opacity: 0.9; margin: 10px 0; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 15px; font-size: 18px; text-align: center; outline: none; background: rgba(255,255,255,0.9); }
        button.btn { background: #fff; color: #ff577f; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; }
        button.btn:active { transform: scale(0.95); }
        .error-msg { color: #ffe6e6; font-size: 14px; margin-top: 10px; display: none; }

        /* Игра */
        #game-screen { display: none; width: 100vw; height: 100vh; flex-direction: column; background: #1a1a2e; }
        
        .machine-container { 
            position: relative; width: 100%; flex-grow: 1; 
            background: linear-gradient(180deg, #2d1b69 0%, #1a1a2e 100%);
            border: 10px solid #ffde59; border-bottom: none; border-radius: 30px 30px 0 0;
            overflow: hidden; 
        }
        
        #claw-system { 
            position: absolute; top: 20px; left: 50%; width: 80px; height: 120px; 
            transform: translateX(-50%); transition: left 0.15s; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; 
        }
        #rope { width: 3px; height: 40px; background: #aaa; transition: height 0.5s; }
        #pincers { width: 70px; height: 30px; background: #ffde59; border-radius: 10px 10px 0 0; position: relative; }
        #pincers::before, #pincers::after { content: ''; position: absolute; bottom: -20px; width: 20px; height: 30px; border: 4px solid #ffde59; border-top: none; transition: 0.3s; }
        #pincers::before { left: 5px; border-right: none; border-radius: 0 0 0 15px; transform: rotate(-10deg); }
        #pincers::after { right: 5px; border-left: none; border-radius: 0 0 15px 0; transform: rotate(10deg); }
        #claw-system.grabbing #pincers::before { transform: rotate(20deg); }
        #claw-system.grabbing #pincers::after { transform: rotate(-20deg); }

        .toys-pool { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; padding: 20px; z-index: 2; }
        .toy-item {
            position: absolute; width: 110px; height: 110px; 
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: all 0.5s; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); z-index: 3;
            animation: floatToy 3s ease-in-out infinite;
        }
        .toy-item:nth-child(2) { animation-delay: 0.5s; }
        .toy-item:nth-child(3) { animation-delay: 1s; }
        .toy-item:nth-child(4) { animation-delay: 1.5s; }
        @keyframes floatToy { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .toy-item.caught { animation: caughtAnim 0.8s forwards; }
        @keyframes caughtAnim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }
        .toy-item.miss { animation: missAnim 0.5s; }
        @keyframes missAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9); } }

        .bg-toy { position: absolute; font-size: 30px; opacity: 0.1; z-index: 1; pointer-events: none; animation: floatBg 6s infinite; }
        @keyframes floatBg { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

        .control-panel { height: 140px; background: linear-gradient(180deg, #ff577f 0%, #e63e6a 100%); display: flex; justify-content: space-around; align-items: center; padding: 10px 20px; border-radius: 30px 30px 0 0; }
        .arrow-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); color: #fff; font-size: 30px; border: 2px solid rgba(255,255,255,0.3); border-radius: 20px; cursor: pointer; }
        .arrow-btn:active { transform: scale(0.9); }
        .action-btn { width: 130px; height: 80px; background: #ffde59; color: #333; font-size: 18px; border: none; border-radius: 50%; font-weight: bold; box-shadow: 0 8px 0 #cdae24; cursor: pointer; }
        .action-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #cdae24; }
        .action-btn:disabled { opacity: 0.5; transform: translateY(4px); box-shadow: 0 4px 0 #cdae24; pointer-events: none; }

        .progress-info { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px 18px; border-radius: 15px; font-size: 16px; z-index: 20; display: flex; align-items: center; gap: 8px; }
        .progress-info .count { color: #ffde59; font-weight: bold; font-size: 20px; }

        /* Поп-ап */
        #win-popup { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 50; padding: 20px; }
        #popup-card { background: #fff; color: #333; padding: 30px; border-radius: 30px; max-width: 340px; width: 100%; transform: scale(0.5); transition: 0.4s; }
        #popup-card.open { transform: scale(1); }
        #popup-card .toy-image { width: 120px; height: 120px; margin: 10px auto; background-size: contain; background-repeat: no-repeat; background-position: center; }
        #popup-card .toy-name { font-size: 24px; font-weight: bold; margin: 10px 0; background: linear-gradient(135deg, #f5576c, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #popup-card .toy-desc { color: #666; font-size: 16px; }
        #popup-card .secret-code { background: #f0f0f0; padding: 12px; border-radius: 12px; margin: 15px 0; font-family: monospace; font-size: 22px; letter-spacing: 4px; color: #ff577f; font-weight: bold; border: 2px dashed #ff577f; }

        /* Финал */
        #final-screen {
            position: fixed; top:0; left:0; width:100vw; height:100vh;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ffde59 100%);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 60; padding: 20px; text-align: center;
        }
        #final-screen .big-emoji { font-size: 80px; }
        #final-screen h1 { font-size: 32px; margin-bottom: 15px; text-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        #final-screen p { font-size: 18px; max-width: 400px; margin: 10px auto; }
        .code-box { background: rgba(255,255,255,0.9); padding: 20px; border-radius: 20px; max-width: 340px; width: 100%; margin: 20px auto; }
        .code-box input { background: transparent; border: 2px dashed #ff577f; border-radius: 12px; padding: 14px; width: 100%; font-size: 20px; text-align: center; letter-spacing: 5px; font-family: monospace; color: #333; }
        .code-error { color: #ff3d6b; font-size: 14px; margin-top: 10px; display: none; font-weight: bold; }

        /* ===== РАБОЧИЙ СТОЛ ===== */
        #desktop-screen {
            position: fixed; top:0; left:0; width:100vw; height:100vh;
            background: #008080; display: none; flex-direction: column; z-index: 70;
        }
        .desktop-wallpaper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, #0055a4 0%, #008080 50%, #00a0a0 100%); z-index: 0; }
        
        .desktop-icons { position: relative; z-index: 1; padding: 30px; display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start; height: calc(100vh - 80px); }
        .desktop-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px; border-radius: 8px; width: 110px; text-align: center; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .desktop-icon:hover { background: rgba(255,255,255,0.15); }
        .desktop-icon .icon-image { font-size: 72px; }
        .desktop-icon .icon-name { font-size: 13px; word-wrap: break-word; max-width: 100px; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 4px; }
        .desktop-icon .icon-name .strikethrough { text-decoration: line-through; color: #ff6b6b; }

        .taskbar { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(180deg, #245edc 0%, #1a4ba8 100%); z-index: 2; display: flex; align-items: center; padding: 0 15px; }
        .taskbar .start-btn { background: #3d7be0; border: 2px solid #6b9ce6; border-radius: 4px; color: #fff; padding: 6px 18px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-right: 15px; }
        .taskbar .taskbar-clock { margin-left: auto; color: #fff; font-size: 14px; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 4px; }

        /* ===== ОКНА - ПРОСТЫЕ СТИЛИ ===== */
        .folder-window, .photo-window {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            background: #ece9d8;
            border: 2px solid #0055a4;
            border-radius: 8px 8px 0 0;
            z-index: 1000 !important;
            display: none !important;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            max-height: 80vh;
        }
        .folder-window { width: 500px; max-width: 90vw; }
        .photo-window { max-width: 90vw; }
        
        .folder-window.active, .photo-window.active { display: flex !important; }
        
        .folder-header, .photo-header {
            background: linear-gradient(180deg, #0a3a7a 0%, #0055a4 100%);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px 6px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .folder-header .strikethrough { text-decoration: line-through; color: #ff6b6b; }
        .folder-header .close-btn, .photo-header .close-btn {
            background: #ff6b6b;
            border: none;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .folder-header .close-btn:hover, .photo-header .close-btn:hover { background: #ff4444; }
        
        .folder-body {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            overflow-y: auto;
            max-height: 50vh;
            justify-content: center;
        }
        .folder-file {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 15px;
            border-radius: 8px;
            width: 100px;
            text-align: center;
            color: #333;
        }
        .folder-file:hover { background: rgba(0,0,0,0.05); }
        .folder-file .file-icon { font-size: 56px; }
        .folder-file .file-name { font-size: 14px; background: rgba(255,255,255,0.7); padding: 2px 8px; border-radius: 3px; font-weight: bold; }

        .photo-body {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            border-radius: 0 0 8px 8px;
            flex-grow: 1;
        }
        .photo-body img { max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: 8px; }

        /* ===== ВИДЕО ===== */
        #video-container {
            position: fixed !important;
            top:0 !important;
            left:0 !important;
            width:100vw !important;
            height:100vh !important;
            background: rgba(0,0,0,0.95) !important;
            display: none !important;
            z-index: 9999 !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        #video-container.active { display: flex !important; }
        #video-container iframe { width: 100%; height: 100%; border: none; background: #000; border-radius: 12px; }
        #video-container .close-video {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3);
            color: #fff; font-size: 28px; border-radius: 50%;
            cursor: pointer; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        #video-container .close-video:hover { background: rgba(255,255,255,0.35); transform: rotate(90deg); }

        #flash { position: fixed; top:0; left:0; width:100vw; height:100vh; background: #fff; opacity: 0; pointer-events: none; z-index: 200; transition: opacity 0.1s; }

        @media (max-width: 480px) {
            .toy-item { width: 80px; height: 80px; }
            .toys-pool { height: 150px; }
            .control-panel { height: 110px; }
            .arrow-btn { width: 55px; height: 55px; font-size: 22px; }
            .action-btn { width: 90px; height: 65px; font-size: 14px; }
            .desktop-icon { width: 80px; }
            .desktop-icon .icon-image { font-size: 52px; }
            .folder-window { width: 95vw; }
            .folder-file { width: 70px; padding: 10px; }
            .folder-file .file-icon { font-size: 40px; }
            #video-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="auth-screen">
        <div class="login-box">
            <h2>🎮 Привет!</h2>
            <p>Введи код:</p>
            <input type="tel" id="password-input" placeholder="ДДММГГГГ" maxlength="8">
            <button class="btn" onclick="checkPassword()">🚀 Начать!</button>
            <div class="error-msg" id="error-msg">😅 Не тот код!</div>
        </div>
    </div>

    <!-- Игра -->
    <div id="game-screen">
        <div class="machine-container">
            <div class="progress-info">
                <span>🎯</span>
                <span class="count" id="caught-count">0</span>
                <span>/ 4</span>
            </div>
            
            <div id="claw-system">
                <div id="rope"></div>
                <div id="pincers"></div>
            </div>
            
            <div class="toys-pool" id="toys-pool"></div>
        </div>
        
        <div class="control-panel">
            <button class="arrow-btn" id="btn-left">◀</button>
            <button class="action-btn" id="btn-catch">🎯 ХВАТАТЬ!</button>
            <button class="arrow-btn" id="btn-right">▶</button>
        </div>
    </div>

    <!-- Поп-ап -->
    <div id="win-popup">
        <div id="popup-card">
            <div class="toy-image" id="popup-image"></div>
            <div class="toy-name" id="popup-name">Игрушка</div>
            <div class="toy-desc" id="popup-desc">Описание</div>
            <div class="secret-code" id="popup-code" style="display:none;">
                🔑 КОД: <span id="secret-code-text">love111</span>
            </div>
            <button class="btn" onclick="closePopup()">✨ Продолжить</button>
        </div>
    </div>

    <!-- Финал -->
    <div id="final-screen">
        <div class="big-emoji">🎉</div>
        <h1>ТЫ СОБРАЛА ВСЕ ПОДАРКИ!</h1>
        <p>В печенье был спрятан код. Введи его!</p>
        <div class="code-box">
            <input type="text" id="final-code-input" placeholder="Код из печенья" maxlength="20">
            <button class="btn" style="margin-top:15px;" onclick="checkFinalCode()">🔓 Открыть!</button>
            <div class="code-error" id="code-error">❌ Неправильный код!</div>
        </div>
    </div>

    <!-- РАБОЧИЙ СТОЛ -->
    <div id="desktop-screen">
        <div class="desktop-wallpaper"></div>
        <div class="desktop-icons">
            <div class="desktop-icon" id="folder-icon">
                <div class="icon-image">📁</div>
                <div class="icon-name"><span class="strikethrough">Эпштейна</span> Гули</div>
            </div>
            <div class="desktop-icon" id="photo-icon">
                <div class="icon-image">🖼️</div>
                <div class="icon-name">Фото</div>
            </div>
        </div>
        <div class="taskbar">
            <div class="start-btn">🪟 Пуск</div>
            <div class="taskbar-clock" id="taskbar-clock">12:00</div>
        </div>
    </div>

    <!-- ОКНО ПАПКИ -->
    <div class="folder-window" id="folder-window">
        <div class="folder-header">
            <span>📁 <span class="strikethrough">Эпштейна</span> Гули</span>
            <button class="close-btn" onclick="closeFolder()">✕</button>
        </div>
        <div class="folder-body" id="folder-body"></div>
    </div>

    <!-- ОКНО ФОТО -->
    <div class="photo-window" id="photo-window">
        <div class="photo-header">
            <span>🖼️ Фото</span>
            <button class="close-btn" onclick="closePhoto()">✕</button>
        </div>
        <div class="photo-body">
            <img id="photo-image" src="foto.png" alt="Фото" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22300%22 height=%22300%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2230%22 font-family=%22sans-serif%22%3E📸 Фото%3C/text%3E%3C/svg%3E'">
        </div>
    </div>

    <!-- ВИДЕО -->
    <div id="video-container">
        <button class="close-video" onclick="closeVideo()">✕</button>
        <iframe id="video-player" src="" frameborder="0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
    </div>

    <div id="flash"></div>

    <script>
        // ======== НАСТРОЙКИ ========
        const SECRET_PASSWORD = '29062005';
        const FINAL_CODE = 'love111';
        
        const toysData = [
            { id: 0, name: 'Печенье', image: 'cook.png', desc: 'Внутри код!', hasCode: true, code: 'love111' },
            { id: 1, name: 'Машинка', image: 'kchay.png', desc: 'Качау!', hasCode: false, code: null },
            { id: 2, name: 'Лабубу', image: 'labubu.png', desc: 'Ультра-редкая!', hasCode: false, code: null },
            { id: 3, name: 'Жвачка', image: 'loveis.png', desc: 'Пузыри любви!', hasCode: false, code: null }
        ];

        const videoFiles = [
            { name: '1', file: 'https://kinescope.io/dsktdsjKkugk66SE9nY9rp' },
            { name: '2', file: 'https://kinescope.io/hJXt4UArgAL4E8v4j4EuMd' },
            { name: '3', file: 'https://kinescope.io/bFj5kAz5VMcUdaheo1hbQ9' },
            { name: '4', file: 'https://kinescope.io/agthin66xcyjqvPpGYRfji' },
            { name: '5', file: 'https://kinescope.io/xjv81XgnS8fnCPwKHM2VpL' },
            { name: '6', file: 'https://kinescope.io/r7Z2UnTh7uu32YLTtTYEPy' },
            { name: '7', file: 'https://kinescope.io/qRXgva7MkJ2CXGiMQYx8Yp' },
            { name: '8', file: 'https://kinescope.io/nVCyFjCzMFJqfoWmSesdsr' }
        ];

        // ======== ИГРА ========
        let clawX = 50, isMoving = false, caughtCount = 0, secretCode = null;
        const toyPositions = [{ left: 12, bottom: 60 }, { left: 34, bottom: 30 }, { left: 58, bottom: 25 }, { left: 82, bottom: 65 }];

        function initGame() {
            const pool = document.getElementById('toys-pool');
            pool.innerHTML = '';
            ['🎀','✨','💫','⭐','🌈','🎈','🌸','💝'].forEach((em, i) => {
                const bg = document.createElement('div');
                bg.className = 'bg-toy';
                bg.textContent = em;
                bg.style.cssText = `left:${5+i*12}%;bottom:${10+Math.random()*30}px;font-size:${30+Math.random()*25}px;animation-delay:${Math.random()*4}s`;
                pool.appendChild(bg);
            });
            toysData.forEach((toy, i) => {
                const el = document.createElement('div');
                el.className = 'toy-item';
                el.id = `toy-${i}`;
                el.style.cssText = `left:${toyPositions[i].left}%;bottom:${toyPositions[i].bottom}px;background-image:url('${toy.image}')`;
                el.dataset.caught = 'false';
                pool.appendChild(el);
            });
            updateProgress();
        }

        function updateProgress() { document.getElementById('caught-count').textContent = caughtCount; }

        function checkPassword() {
            const pass = document.getElementById('password-input').value;
            if(pass === SECRET_PASSWORD) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                initGame();
            } else {
                const err = document.getElementById('error-msg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }

        // Управление
        const claw = document.getElementById('claw-system');
        const rope = document.getElementById('rope');
        const btnCatch = document.getElementById('btn-catch');

        document.getElementById('btn-left').onclick = () => { if(!isMoving && caughtCount<4) { clawX = Math.max(6, clawX-5); claw.style.left = clawX+'%'; } };
        document.getElementById('btn-right').onclick = () => { if(!isMoving && caughtCount<4) { clawX = Math.min(94, clawX+5); claw.style.left = clawX+'%'; } };
        btnCatch.onclick = () => { if(!isMoving && caughtCount<4) startCatch(); };

        function startCatch() {
            isMoving = true;
            btnCatch.disabled = true;
            claw.classList.add('grabbing');
            rope.style.height = '180px';

            setTimeout(() => {
                const clawLeft = clawX;
                let caughtIdx = -1;
                for(let i=0; i<toysData.length; i++) {
                    const el = document.getElementById(`toy-${i}`);
                    if(!el || el.dataset.caught === 'true') continue;
                    if(Math.abs(clawLeft - parseFloat(el.style.left)) < 14) { caughtIdx = i; break; }
                }
                setTimeout(() => {
                    rope.style.height = '40px';
                    if(caughtIdx !== -1) {
                        const toy = toysData[caughtIdx];
                        const el = document.getElementById(`toy-${caughtIdx}`);
                        el.classList.add('caught');
                        el.dataset.caught = 'true';
                        if(toy.hasCode && toy.code) secretCode = toy.code;
                        caughtCount++;
                        updateProgress();
                        setTimeout(() => {
                            showPopup(toy);
                            claw.classList.remove('grabbing');
                            isMoving = false;
                            btnCatch.disabled = false;
                            if(caughtCount === 4) setTimeout(showFinalScreen, 800);
                        }, 400);
                    } else {
                        document.querySelectorAll('.toy-item:not([data-caught="true"])').forEach(el => {
                            el.classList.add('miss');
                            setTimeout(() => el.classList.remove('miss'), 500);
                        });
                        setTimeout(() => { claw.classList.remove('grabbing'); isMoving = false; btnCatch.disabled = false; }, 300);
                    }
                }, 200);
            }, 600);
        }

        function showPopup(toy) {
            document.getElementById('popup-image').style.backgroundImage = `url('${toy.image}')`;
            document.getElementById('popup-name').textContent = toy.name;
            document.getElementById('popup-desc').textContent = toy.desc;
            const codeEl = document.getElementById('popup-code');
            if(toy.hasCode && toy.code) { codeEl.style.display = 'block'; document.getElementById('secret-code-text').textContent = toy.code; }
            else codeEl.style.display = 'none';
            document.getElementById('win-popup').style.display = 'flex';
            setTimeout(() => document.getElementById('popup-card').classList.add('open'), 50);
        }

        function closePopup() {
            document.getElementById('popup-card').classList.remove('open');
            document.getElementById('win-popup').style.display = 'none';
        }

        function showFinalScreen() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('final-screen').style.display = 'flex';
        }

        function checkFinalCode() {
            const input = document.getElementById('final-code-input').value.toLowerCase().trim();
            const error = document.getElementById('code-error');
            if(input === FINAL_CODE || (secretCode && input === secretCode)) {
                error.style.display = 'none';
                document.getElementById('final-screen').style.display = 'none';
                showDesktop();
            } else {
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 3000);
            }
        }

        // ======== РАБОЧИЙ СТОЛ ========
        function showDesktop() {
            document.getElementById('desktop-screen').style.display = 'flex';
            updateClock();
            setInterval(updateClock, 1000);
            
            document.getElementById('folder-icon').onclick = function() {
                openFolder();
            };
            
            document.getElementById('photo-icon').onclick = function() {
                openPhoto();
            };
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('taskbar-clock').textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // ======== ОКНА ========
        function openFolder() {
            const windowEl = document.getElementById('folder-window');
            const body = document.getElementById('folder-body');
            
            body.innerHTML = '';
            videoFiles.forEach((video, index) => {
                const file = document.createElement('div');
                file.className = 'folder-file';
                file.innerHTML = `<div class="file-icon">🎬</div><div class="file-name">${video.name}</div>`;
                file.onclick = function() { playVideo(index); };
                body.appendChild(file);
            });
            
            // Прямое управление display
            windowEl.style.display = 'flex';
            windowEl.classList.add('active');
            document.getElementById('photo-window').style.display = 'none';
            document.getElementById('photo-window').classList.remove('active');
        }

        function closeFolder() {
            const windowEl = document.getElementById('folder-window');
            windowEl.style.display = 'none';
            windowEl.classList.remove('active');
        }

        function openPhoto() {
            const windowEl = document.getElementById('photo-window');
            windowEl.style.display = 'flex';
            windowEl.classList.add('active');
            document.getElementById('folder-window').style.display = 'none';
            document.getElementById('folder-window').classList.remove('active');
        }

        function closePhoto() {
            const windowEl = document.getElementById('photo-window');
            windowEl.style.display = 'none';
            windowEl.classList.remove('active');
        }

        // ======== ВИДЕО ========
        function playVideo(index) {
            const container = document.getElementById('video-container');
            const player = document.getElementById('video-player');
            
            closeFolder();
            closePhoto();
            
            document.getElementById('flash').style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('flash').style.opacity = '0';
                container.style.display = 'flex';
                container.classList.add('active');
                player.src = videoFiles[index].file + '?autoplay=1';
            }, 150);
        }

        function closeVideo() {
            const container = document.getElementById('video-container');
            const player = document.getElementById('video-player');
            player.src = '';
            container.style.display = 'none';
            container.classList.remove('active');
        }

        // ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeVideo();
                closeFolder();
                closePhoto();
            }
        });

        console.log('🎁 Игра загружена!');
        console.log('💡 Код входа: 29062005');
        console.log('🔑 Код из печенья: love111');
    </script>
</body>
